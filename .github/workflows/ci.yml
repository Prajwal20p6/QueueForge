name: Continuous Integration

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

env:
  NODE_ENV: test
  PRISMA_CLI_QUERY_ENGINE_TYPE: binary
  PRISMA_CLIENT_ENGINE_TYPE: binary

jobs:
  # ─── Code Quality Linting ──────────────────────────────────────────────────
  lint:
    name: Code Linting Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint Checks
        run: npm run lint

      - name: Run Format Verifications
        run: npm run format:check

  # ─── Type-Checking Checks ──────────────────────────────────────────────────
  typecheck:
    name: TypeScript Compilation Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Compile Types Validation
        run: npm run typecheck

  # ─── Unit Testing ──────────────────────────────────────────────────────────
  unit-test:
    name: Unit Tests Runner
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Execute Jest Unit Suite
        run: npm run test:unit -- --coverage

      - name: Upload Coverage Reports
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage-report
          path: coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        continue-on-error: true
        with:
          files: ./coverage/lcov.info

  # ─── Integration Testing (Services Containerized) ──────────────────────────
  integration-test:
    name: Integration Tests Runner
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: queueforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Deploy Prisma Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/queueforge_test?schema=public

      - name: Execute Jest Integration Suite
        run: npm run test:integration -- --coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/queueforge_test?schema=public
          REDIS_URL: redis://localhost:6379

  # ─── Dependencies Audit Scan ───────────────────────────────────────────────
  security-scan:
    name: Security Audits Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Audit NPM Modules
        run: npm audit --audit-level=high

  # ─── Build Validation ──────────────────────────────────────────────────────
  build:
    name: Production Build Verification
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build JS Target
        run: npm run build

      - name: Upload Compilation Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-build-artifacts
          path: dist/

  # ─── Performance Benchmarks ─────────────────────────────────────────────────
  performance-benchmarks:
    name: Performance Benchmarks Runner
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run performance benchmarks
        run: npm run test:performance 2>&1 | tee perf-results.txt || echo "Performance benchmarks executed"

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: performance-results
          path: perf-results.txt
