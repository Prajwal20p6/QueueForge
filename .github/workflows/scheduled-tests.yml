name: Scheduled Extended Tests Suite

on:
  schedule:
    - cron: '0 2 * * *' # Every night at 2:00 AM
  workflow_dispatch:

jobs:
  # ─── Full Suite (Unit, Integration, Chaos) Runner ─────────────────────────
  full-test-suite:
    name: Nightly Testing Suite
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: queueforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Deploy Database Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/queueforge_test?schema=public

      - name: Execute Complete Jest Testing Suite
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/queueforge_test?schema=public
          REDIS_URL: redis://localhost:6379

  # ─── Isolated Chaos Tests Scenarios ────────────────────────────────────────
  chaos-tests:
    name: Chaos Testing Runner
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: queueforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Deploy Database Migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/queueforge_test?schema=public

      - name: Execute Jest Chaos Test Suite Only
        run: npm run test:chaos
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/queueforge_test?schema=public
          REDIS_URL: redis://localhost:6379
