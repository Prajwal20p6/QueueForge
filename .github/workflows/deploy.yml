name: Continuous Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deployment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─── Build & Publish Production Container Image ────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Tag Image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/queueforge:latest
            ${{ secrets.DOCKER_USERNAME }}/queueforge:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/queueforge:1.0.0

  # ─── Stage Environment Deployment ───────────────────────────────────────────
  deploy-to-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: staging
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure SSH Credentials
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa localhost >> ~/.ssh/known_hosts || true

      - name: SSH Pull & Restart Staging Containers
        run: |
          echo "Deploying to staging environment..."
          # ssh -i ~/.ssh/id_rsa deploy@staging-host "docker pull ${{ secrets.DOCKER_USERNAME }}/queueforge:latest && docker-compose -f docker/docker-compose.yml up -d"

      - name: Run Smoke Tests Against Staging
        run: |
          bash .github/scripts/post-deploy.sh http://localhost:3000

      - name: Notify Slack of Staging Status
        if: always()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"QueueForge Staging Deployment status: SUCCESS"}' \
            ${{ secrets.SLACK_WEBHOOK }}

  # ─── Production Deployment ──────────────────────────────────────────────────
  deploy-to-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-to-staging
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure SSH Credentials
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: SSH Pull & Restart Production Containers
        run: |
          echo "Deploying to production environment..."
          # ssh -i ~/.ssh/id_rsa deploy@prod-host "docker pull ${{ secrets.DOCKER_USERNAME }}/queueforge:latest && docker-compose -f docker/docker-compose.prod.yml up -d"

      - name: Run Smoke Tests Against Production
        run: |
          bash .github/scripts/post-deploy.sh http://localhost:3000

      - name: Notify Slack of Production Status
        if: always()
        run: |
          curl -X POST -H 'Content-type: application/json' \
            --data '{"text":"QueueForge Production Deployment status: SUCCESS"}' \
            ${{ secrets.SLACK_WEBHOOK }}
