name: Security Scan

on: [push, pull_request]

jobs:
  security:
    name: Security Audits & Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --production 2>&1 || echo "Warnings found"

      - name: Run Snyk High Severity Scan
        run: npx snyk test --severity-threshold=high 2>&1 || true
