name: Pull Request Performance Check

on:
  pull_request:
    branches: [ main ]

jobs:
  check-regressions:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Verify no performance regressions
        run: npx ts-node tests/benchmarks/regression-check.ts
