name: Changelog Update Verification

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - 'src/**'

jobs:
  # ─── Verify Changelog Modification ─────────────────────────────────────────
  validate-changelog:
    name: Check CHANGELOG.md Modified
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Changelog File in Diff
        run: |
          # Fetch main branch reference to generate diff
          git fetch origin main:main
          if ! git diff --name-only main | grep -q "CHANGELOG.md"; then
            echo "::error::CHANGELOG.md was not updated in this pull request! Please log your changes."
            exit 1
          fi
          echo "CHANGELOG.md verification passed!"
