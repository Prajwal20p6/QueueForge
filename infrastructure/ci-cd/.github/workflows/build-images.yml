name: Container Build & Push

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API Image
        run: docker build -f infrastructure/docker/Dockerfile.api -t queueforge/api:latest .

      - name: Build Worker Image
        run: docker build -f infrastructure/docker/Dockerfile.worker -t queueforge/worker:latest .

      - name: Build Daemon Image
        run: docker build -f infrastructure/docker/Dockerfile.daemon -t queueforge/daemon:latest .
