version: '3.8'

networks:
  queueforge-prod-net:
    driver: bridge

services:
  api:
    image: queueforge/api:latest
    container_name: queueforge-api-prod
    networks:
      - queueforge-prod-net
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    environment:
      NODE_ENV: production
      RUN_MIGRATIONS: "true"

  worker:
    image: queueforge/worker:latest
    container_name: queueforge-worker-prod
    networks:
      - queueforge-prod-net
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2.0'
          memory: 2048M
    environment:
      NODE_ENV: production

  daemon:
    image: queueforge/daemon:latest
    container_name: queueforge-daemon-prod
    networks:
      - queueforge-prod-net
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M
    environment:
      NODE_ENV: production
