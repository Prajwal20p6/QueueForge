version: '3.8'

networks:
  queueforge-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:

services:
  postgres:
    image: postgres:16-alpine
    container_name: queueforge-postgres
    networks:
      - queueforge-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: queueforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: queueforge-redis
    networks:
      - queueforge-net
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.api
    container_name: queueforge-api
    networks:
      - queueforge-net
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/queueforge?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: supersecretjwtkeyforqueueforgetesting123
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.worker
    container_name: queueforge-worker
    networks:
      - queueforge-net
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/queueforge?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - api

  daemon:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.daemon
    container_name: queueforge-daemon
    networks:
      - queueforge-net
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgrespassword@postgres:5432/queueforge?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - api
