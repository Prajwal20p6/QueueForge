apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: queueforge-ingress
  namespace: queueforge
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.queueforge.example.com
      secretName: queueforge-tls
  rules:
    - host: api.queueforge.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: queueforge-api-service
                port:
                  number: 80
