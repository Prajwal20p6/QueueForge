apiVersion: apps/v1
kind: Deployment
metadata:
  name: queueforge-worker
  namespace: queueforge
  labels:
    app: queueforge-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: queueforge-worker
  template:
    metadata:
      labels:
        app: queueforge-worker
    spec:
      serviceAccountName: queueforge-sa
      containers:
        - name: worker
          image: queueforge/worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: queueforge-config
            - secretRef:
                name: queueforge-secrets
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2048Mi"
