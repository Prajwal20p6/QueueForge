apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: queueforge
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m
    route:
      group_by: ['alertname']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h
      receiver: 'slack-notifications'
    receivers:
    - name: 'slack-notifications'
      slack_configs:
      - api_url: 'http://localhost:8080/webhook'
        channel: '#alerts'
        send_resolved: true
