apiVersion: v1
kind: Namespace
metadata:
  name: queueforge
  labels:
    environment: production
    managed-by: helm
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: queueforge-quota
  namespace: queueforge
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "10"
    limits.memory: 16Gi
