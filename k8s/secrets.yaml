apiVersion: v1
kind: Secret
metadata:
  name: queueforge-secrets
  namespace: queueforge
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres-service.queueforge.svc.cluster.local:5432/queueforge?schema=public"
  REDIS_URL: "redis://redis-service.queueforge.svc.cluster.local:6379"
  JWT_SECRET: "production-jwt-secret-key-must-be-very-long-and-secure"
  API_KEY_SECRET: "production-api-key-secret-key-must-be-very-long"
  HMAC_SECRET: "production-hmac-secret-key-must-be-very-long-and-secure"
