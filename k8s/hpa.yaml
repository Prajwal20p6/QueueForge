apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: queueforge-api-hpa
  namespace: queueforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: queueforge-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
