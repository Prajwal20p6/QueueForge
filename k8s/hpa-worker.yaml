apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: queueforge-worker-hpa
  namespace: queueforge
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: StatefulSet
    name: queueforge-worker
  minReplicas: 2
  maxReplicas: 20
  metrics:
  - type: External
    external:
      metric:
        name: queueforge_queue_depth
      target:
        type: Value
        value: "500"
