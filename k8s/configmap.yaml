apiVersion: v1
kind: ConfigMap
metadata:
  name: queueforge-config
  namespace: queueforge
data:
  NODE_ENV: "production"
  PORT: "3000"
  DB_POOL_MIN: "5"
  DB_POOL_MAX: "20"
  REDIS_POOL_MAX: "20"
  WORKER_CONCURRENCY: "4"
  WORKER_POLL_INTERVAL_MS: "50"
  OTEL_SERVICE_NAME: "queueforge-service"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger-collector.queueforge.svc.cluster.local:4317"
  LOG_LEVEL: "info"
