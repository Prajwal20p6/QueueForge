# ──────────────────────────────────────────────────────────────────────────────
# Nginx Reverse Proxy Global Configurations
# ──────────────────────────────────────────────────────────────────────────────

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Define Logging format redactable format if required
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip Compression settings
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Rate Limiting configuration
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;

    # Upstream backend mapping pointing to local docker compose app
    upstream queueforge_backend {
        server queueforge:3000;
        keepalive 32;
    }

    # 1. HTTP Server Block (Redirect to HTTPS or route directly if SSL is handled elsewhere)
    server {
        listen 80;
        server_name localhost;

        # Standard healthcheck probe mapping
        location /health {
            proxy_pass http://queueforge_backend/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        # Route main traffic
        location / {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://queueforge_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            
            # Request Headers propagation
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Security Headers
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;

            # CORS Headers
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-API-Key' always;
        }
    }
}
